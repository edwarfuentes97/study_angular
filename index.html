  <script>
    (function (location) {
      if (!location.search.startsWith('?/')) {
        return;
      }

      const decoded = location.search
        .slice(1)
        .split('&')
        .map((segment) => segment.replace(/~and~/g, '&'))
        .join('?');

      window.history.replaceState(
        null,
        '',
        `${location.pathname.replace(/\\/$/, '')}${decoded}${location.hash}`,
      );
    })(window.location);
  </script>
