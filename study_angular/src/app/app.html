<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1 class="logo">🎯 Study<span>Angular</span></h1>
      <app-global-search />
      <div class="overall-progress">
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="progressService.overallPercent()"></div>
        </div>
        <span class="progress-text">{{ progressService.overallPercent() }}% completado</span>
      </div>
    </div>

    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
        <span class="nav-icon">📊</span>
        <span>Dashboard</span>
      </a>
      <a routerLink="/guide" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📖</span>
        <span>Guía de Estudio</span>
      </a>

      <div class="nav-section">Labs de Práctica</div>

      @for (topic of topics; track topic.id) {
        <a [routerLink]="topic.route" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">{{ topic.icon }}</span>
          <span class="nav-label">{{ topic.title }}</span>
          <span class="nav-percent">{{ progressService.topicPercents()[topic.id] }}%</span>
        </a>
      }
    </nav>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
